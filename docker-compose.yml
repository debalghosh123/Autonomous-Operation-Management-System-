version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-career-lab-dev-key}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DATABASE_PATH=/app/data/evaluation.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
