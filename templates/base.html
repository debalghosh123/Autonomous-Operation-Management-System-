<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Career Lab Consulting - Python Evaluation{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img src="https://www.careerlabconsulting.com/logo.png" alt="Career Lab Consulting" class="nav-logo">
                Career Lab Consulting
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/register" class="nav-link">Take Exam</a>
                <a href="/admin/login" class="nav-link">Admin</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 Career Lab Consulting. All rights reserved.</p>
            <p>Python Evaluation System - Powered by Groq AI</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
