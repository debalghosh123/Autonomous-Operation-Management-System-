<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Career Lab Consulting - Python Evaluation{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img src="https://www.careerlabconsulting.com/logo.png" alt="Career Lab Consulting" class="nav-logo" onerror="this.style.display='none'">
                <span class="nav-brand-text">Career Lab Consulting</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/register" class="nav-link">Take Exam</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-admin-links">
                <a href="/admin/dashboard" class="footer-admin-link">
                    <i class="fas fa-tachometer-alt"></i> Admin Dashboard
                </a>
                <a href="/admin/questions" class="footer-admin-link">
                    <i class="fas fa-database"></i> Question Bank
                </a>
                <a href="/admin/login" class="footer-admin-link">
                    <i class="fas fa-sign-in-alt"></i> Admin Login
                </a>
            </div>
            <p>Python Evaluation System - Powered by Groq AI</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}

    <!-- Custom Modal -->
    <div id="custom-modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-icon" id="modal-icon"><i class="fas fa-info-circle"></i></div>
                <h3 class="modal-title" id="modal-title">Confirm</h3>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="modal-message"></p>
            </div>
            <div class="modal-actions" id="modal-actions">
                <button class="btn btn-secondary modal-btn-cancel" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary modal-btn-confirm" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
