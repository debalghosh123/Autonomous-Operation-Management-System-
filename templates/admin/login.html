{% extends "base.html" %}

{% block title %}Admin Login - Career Lab Consulting{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container admin-login">
        <div class="form-header">
            <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
            <p>Access the administration panel</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user-shield"></i> Username
                </label>
                <input type="text" id="username" name="username" required 
                       placeholder="Admin username" class="form-control">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" id="password" name="password" required 
                       placeholder="Admin password" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
