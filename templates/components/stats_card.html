<!-- Career Lab Consulting - Statistics Card Component -->
<div class="stat-card {{ card_class }}">
    <div class="stat-icon">
        <i class="fas {{ icon }}"></i>
    </div>
    <div class="stat-details">
        <div class="stat-value">{{ value }}</div>
        <div class="stat-label">{{ label }}</div>
    </div>
</div>
