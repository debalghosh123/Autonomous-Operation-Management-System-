name: career-lab-evaluation
type: web
definition:
  docker:
    dockerfile: Dockerfile
  instance_types:
    - type: nano
  regions:
    - was
  ports:
    - port: 8000
      protocol: http
  routes:
    - path: /
      port: 8000
  health_checks:
    - path: /api/health
      port: 8000
      protocol: http
      interval_seconds: 30
      timeout_seconds: 10
      healthy_threshold: 1
      unhealthy_threshold: 3
  env:
    - key: PORT
      value: "8000"
    - key: RESEND_API_KEY
      type: secret
    - key: SECRET_KEY
      type: secret
    - key: ADMIN_PASSWORD
      type: secret
  scaling:
    min: 1
    max: 1
